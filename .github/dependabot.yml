version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - eslint
          - eslint-*
          - "@eslint/*"
          - typescript-eslint
      playwright:
        patterns:
          - "@playwright/test"
      reporting:
        patterns:
          - monocart-reporter

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
