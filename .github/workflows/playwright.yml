name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Add typecheck summary
        if: always()
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## Typecheck

          | Signal | Value |
          | --- | --- |
          | Command | `npm run typecheck` |
          | Outcome | `${{ steps.typecheck.outcome }}` |
          | Purpose | Validate TypeScript without emitting build output. |
          SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: npm run lint

      - name: Add lint summary
        if: always()
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## Lint

          | Signal | Value |
          | --- | --- |
          | Command | `npm run lint` |
          | Outcome | `${{ steps.lint.outcome }}` |
          | Purpose | Enforce ESLint and Playwright test-quality rules. |
          SUMMARY

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production and dev dependencies
        id: audit
        run: npm run security:audit

      - name: Add security audit summary
        if: always()
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## Security Audit

          | Signal | Value |
          | --- | --- |
          | Command | `npm run security:audit` |
          | Outcome | `${{ steps.audit.outcome }}` |
          | Purpose | Block high-severity npm dependency findings. |
          SUMMARY

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - lint
      - security
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        id: ui_tests
        run: npm run test:ui

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monocart-report-ui
          path: monocart-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Add UI test summary
        if: always()
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## UI Tests

          | Signal | Value |
          | --- | --- |
          | Command | `npm run test:ui` |
          | Outcome | `${{ steps.ui_tests.outcome }}` |
          | Browser | Chromium |
          | Playwright report artifact | `playwright-report-ui` |
          | Monocart report artifact | `monocart-report-ui` |
          | Failure artifacts | `test-results-ui` |
          SUMMARY

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs:
      - typecheck
      - lint
      - security
    timeout-minutes: 15

    env:
      GOREST_API_TOKEN: ${{ secrets.GOREST_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API token secret
        id: token
        run: |
          if [ -z "$GOREST_API_TOKEN" ]; then
            echo "::warning::GOREST_API_TOKEN repository secret is not set. Authenticated API CRUD test will be skipped."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full API suite
        id: full_api_suite
        if: steps.token.outputs.available == 'true'
        run: npm run test:api

      - name: Run token-free API suite
        id: token_free_api_suite
        if: steps.token.outputs.available != 'true'
        run: npx playwright test tests/api --grep-invert @crud

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monocart-report-api
          path: monocart-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-api
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Add API test summary
        if: always()
        run: |
          cat <<'SUMMARY' >> "$GITHUB_STEP_SUMMARY"
          ## API Tests

          | Signal | Value |
          | --- | --- |
          | Token available | `${{ steps.token.outputs.available }}` |
          | Full API suite outcome | `${{ steps.full_api_suite.outcome || 'skipped' }}` |
          | Token-free API suite outcome | `${{ steps.token_free_api_suite.outcome || 'skipped' }}` |
          | Playwright report artifact | `playwright-report-api` |
          | Monocart report artifact | `monocart-report-api` |
          | Failure artifacts | `test-results-api` |
          SUMMARY
