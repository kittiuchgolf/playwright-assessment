name: Playwright Tests

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monocart-report-ui
          path: monocart-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15

    env:
      GOREST_API_TOKEN: ${{ secrets.GOREST_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API token secret
        id: token
        run: |
          if [ -z "$GOREST_API_TOKEN" ]; then
            echo "::warning::GOREST_API_TOKEN repository secret is not set. Authenticated API CRUD test will be skipped."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full API suite
        if: steps.token.outputs.available == 'true'
        run: npm run test:api

      - name: Run token-free API suite
        if: steps.token.outputs.available != 'true'
        run: npx playwright test tests/api --grep-invert @crud

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Monocart report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monocart-report-api
          path: monocart-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-api
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
